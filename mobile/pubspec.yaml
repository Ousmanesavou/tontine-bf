name: tontine_bf
description: Application de gestion de tontines - Burkina Faso
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.0
  retrofit: ^4.1.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_inappwebview: ^6.0.0
  flutter_tts: ^3.8.5

  just_audio: ^0.9.36
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.0
  intl: ^0.20.2
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  video_player: ^2.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700