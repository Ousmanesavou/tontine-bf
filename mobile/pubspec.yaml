name: tontine_bf
description: Application de gestion de tontines - Afrique
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Navigation & State
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0

  # Stockage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.0
  intl: ^0.20.2

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  flutter_tts: ^3.8.5
  just_audio: ^0.9.36

  # Système
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.4
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700